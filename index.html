<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HHT Freight Group | 3PL Logistics USA</title>

<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;800&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#0B1C2E;--navy2:#122236;--blue2:#1976D2;
  --orange:#E65100;--orange2:#FF6D00;
  --gray:#8899AA;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
}
body{font-family:'Barlow',sans-serif;background:var(--navy);color:#fff}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;background:#0B1C2E;padding:15px 5vw;display:flex;justify-content:space-between}
.logo{font-weight:800}
.logo span{color:var(--orange2)}
nav ul{display:flex;gap:20px;list-style:none}
nav a{color:#fff;text-decoration:none}
.nav-cta{background:var(--orange);border:none;padding:8px 16px;color:#fff;cursor:pointer}

/* HERO */
.hero{padding:120px 5vw 60px}
.hero h1{font-size:48px}
.hero h1 span{color:var(--orange2)}
.hero-img-wrap img{width:100%;height:250px;object-fit:cover}

/* SERVICES */
.services{padding:80px 5vw}
.services-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.service-card img{width:100%;height:180px;object-fit:cover}

/* CONTACT */
.contact{padding:80px 5vw}
.contact-form{display:flex;flex-direction:column;gap:12px;margin-top:20px}
.form-row{display:flex;gap:10px}
input,textarea,select{padding:12px;background:#122236;border:1px solid #333;color:#fff}
textarea{min-height:100px}
.submit-btn{background:var(--orange);border:none;padding:12px;color:#fff;cursor:pointer}
.form-msg{display:none;padding:10px;margin-top:10px}
.success{background:#0f5132}
.error{background:#842029}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="logo">HHT <span>FREIGHT</span></div>
  <ul>
    <li><a href="#services">Services</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
  <button class="nav-cta" onclick="document.getElementById('contact').scrollIntoView()">Quote</button>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Moving Freight <span>Across America</span></h1>
  <p>Reliable logistics across all 48 US states.</p>
  <div class="hero-img-wrap">
    <img src="images/hero-truck.jpg">
  </div>
</section>

<!-- SERVICES -->
<section class="services" id="services">
  <h2>Our Services</h2>
  <div class="services-grid">

    <div class="service-card">
      <img src="images/ftl-truck-loading.jpg">
      <h3>FTL</h3>
      <p>Full truckload shipping</p>
    </div>

    <div class="service-card">
      <img src="images/ltl-warehouse.jpg">
      <h3>LTL</h3>
      <p>Shared freight solutions</p>
    </div>

    <div class="service-card">
      <img src="images/port-logistics.jpg">
      <h3>Drayage</h3>
      <p>Port logistics</p>
    </div>

    <div class="service-card">
      <img src="images/cargo-ship.jpg">
      <h3>Port Transport</h3>
      <p>Intermodal shipping</p>
    </div>

  </div>
</section>

<!-- CONTACT -->
<section class="contact" id="contact">
  <h2>Contact Us</h2>

  <div class="contact-form" id="contactForm">

    <div class="form-row">
      <input type="text" id="fname" placeholder="Your Name" required>
      <input type="text" id="fcompany" placeholder="Company Name">
    </div>

    <div class="form-row">
      <input type="email" id="femail" placeholder="Email" required>
      <input type="tel" id="fphone" placeholder="Phone">
    </div>

    <select id="fservice" required>
      <option value="">Select Service</option>
      <option>FTL</option>
      <option>LTL</option>
      <option>Drayage</option>
      <option>Port Transport</option>
    </select>

    <textarea id="fmessage" placeholder="Enter your message" required></textarea>

    <button class="submit-btn" onclick="submitForm()">Send Request</button>

    <div class="form-msg" id="formMsg"></div>

  </div>
</section>

<!-- SCRIPT -->
<script>
function submitForm(){
  let name=document.getElementById("fname").value;
  let email=document.getElementById("femail").value;
  let service=document.getElementById("fservice").value;
  let message=document.getElementById("fmessage").value;
  let msg=document.getElementById("formMsg");

  if(!name || !email || !service || !message){
    msg.style.display="block";
    msg.className="form-msg error";
    msg.innerText="Fill required fields";
    return;
  }

  msg.style.display="block";
  msg.className="form-msg success";
  msg.innerText="Request sent successfully!";

  document.getElementById("contactForm").reset();
}
</script>

</body>
</html>
